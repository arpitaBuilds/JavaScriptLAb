<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<title>SIT Nagpur - Student Information</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    background:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
    url("sit.png");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}



header{
    width:100%;
    height:80px;
    background:#d71920;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 70px;
    position:sticky;
    top:0;
    z-index:1000;
    box-shadow:0 3px 10px rgba(0,0,0,.3);
}

.logo{
    color:white;
    font-size:28px;
    font-weight:bold;
    letter-spacing:1px;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:30px;
    font-size:17px;
    transition:.3s;
}

nav a:hover{
    color:#ffd700;
}



.hero{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:90vh;
    padding:40px;
}



.form-box{

    width:520px;

    background:rgba(255,255,255,.15);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,.3);

    border-radius:20px;

    padding:35px;

    box-shadow:0 15px 35px rgba(0,0,0,.45);

}

.form-box h1{

    text-align:center;

    color:white;

    margin-bottom:25px;

}

.form-box input,
.form-box textarea,
.form-box select{

    width:100%;

    padding:13px;

    margin:10px 0;

    border:none;

    border-radius:8px;

    font-size:15px;

    background:rgba(255,255,255,.85);

    transition:.3s;

}

.form-box textarea{

    resize:none;

    height:80px;

}

.form-box input:focus,
.form-box textarea:focus,
.form-box select:focus{

    outline:none;

    box-shadow:0 0 10px red;

    transform:scale(1.02);

}



button{

    width:100%;

    padding:14px;

    margin-top:15px;

    border:none;

    border-radius:8px;

    background:#d71920;

    color:white;

    font-size:18px;

    cursor:pointer;

    transition:.3s;

}

button:hover{

    background:#b00000;

    transform:translateY(-3px);

    box-shadow:0 8px 20px rgba(215,25,32,.5);

}



#output{

    width:80%;

    margin:30px auto;

    background:white;

    border-radius:15px;

    padding:25px;

    box-shadow:0 10px 30px rgba(0,0,0,.3);

}

#output h2{

    color:#d71920;

    margin-bottom:15px;

}

#output p{

    padding:8px;

    border-bottom:1px solid #ddd;

    font-size:16px;

}



@media(max-width:768px){

header{

    flex-direction:column;

    height:auto;

    padding:20px;

}

nav{

    margin-top:10px;

}

nav a{

    display:block;

    margin:10px 0;

}

.form-box{

    width:95%;

}

#output{

    width:95%;

}

}
footer{
    background:#d71920;
    color:white;
    text-align:center;
    padding:18px;
    margin-top:30px;
    font-size:17px;
    font-weight:500;
}

footer span{
    color:#ffd700;
    font-weight:bold;
    letter-spacing:1px;
}

footer i{
    color:#ffd700;
    margin-right:8px;
}

</style>

<script>

function showWelcome(){

alert("Welcome to SIT Nagpur");

let name=document.getElementById("name").value;
let roll=document.getElementById("roll").value;
let age=document.getElementById("age").value;
let email=document.getElementById("email").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;
let department=document.getElementById("department").value;
let semester=document.getElementById("semester").value;
let cgpa=document.getElementById("cgpa").value;
let gender=document.getElementById("gender").value;
let pskills=document.getElementById("pskills").value;
let tskills=document.getElementById("tskills").value;

document.getElementById("output").innerHTML=

"<h2>Student Information</h2>"+

"<p><b>Name :</b> "+name+"</p>"+

"<p><b>Roll Number :</b> "+roll+"</p>"+

"<p><b>Age :</b> "+age+"</p>"+

"<p><b>Email :</b> "+email+"</p>"+

"<p><b>Phone :</b> "+phone+"</p>"+

"<p><b>Address :</b> "+address+"</p>"+

"<p><b>Department :</b> "+department+"</p>"+

"<p><b>Semester :</b> "+semester+"</p>"+

"<p><b>CGPA :</b> "+cgpa+"</p>"+

"<p><b>Gender :</b> "+gender+"</p>"+

"<p><b>Professional Skills :</b> "+pskills+"</p>"+

"<p><b>Technical Skills :</b> "+tskills+"</p>";

}

</script>

</head>

<body>

<header>

<div class="logo">
<img src="logo.png" alt="">
</div>

<nav>

<a href="#"><i class="fa-solid fa-house"></i> Home</a>

<a href="#"><i class="fa-solid fa-circle-info"></i> About Us</a>

<a href="#"><i class="fa-solid fa-building"></i> Department</a>

<a href="#"><i class="fa-solid fa-ticket"></i> Admissions</a>

<a href="#"><i class="fa-solid fa-graduation-cap"></i> Placement</a>

<a href="#"><i class="fa-solid fa-chalkboard-user"></i> Faculty</a>

<a href="#"><i class="fa-solid fa-address-book"></i> Contact</a>

</nav>

</header>

<div class="hero">

<div class="form-box">

<h1>Student Information Form</h1>

<input type="text" id="name" placeholder="Enter Full Name">

<input type="text" id="roll" placeholder="Enter Roll Number">

<input type="number" id="age" placeholder="Enter Age">

<input type="email" id="email" placeholder="Enter Email">

<input type="text" id="phone" placeholder="Enter Phone Number">

<textarea id="address" placeholder="Enter Address"></textarea>

<input type="text" id="department" placeholder="Department">

<input type="text" id="semester" placeholder="Semester">

<input type="text" id="cgpa" placeholder="CGPA">

<select id="gender">

<option>Select Gender</option>

<option>Male</option>

<option>Female</option>

<option>Other</option>

</select>

<input type="text" id="pskills" placeholder="Professional Skills">

<input type="text" id="tskills" placeholder="Technical Skills">

<button onclick="showWelcome()">Submit</button>

</div>

</div>

<div id="output"></div>
<footer>
    <p>
        <i class="fa-solid fa-code"></i>
        Designed & Developed by
        <span>Arpita Waghmare</span>
    </p>
</footer>
</body>
</html>
