<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billing Calculator</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:350px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:10px;
    background:green;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:darkgreen;
}

#output{
    margin-top:20px;
    background:#eef;
    padding:10px;
}
</style>

</head>
<body>

<div class="container">

<h2>Billing Calculator</h2>

<input type="text" id="Name" placeholder="Customer Name">

<input type="text" id="Product" placeholder="Product Name">

<input type="number" id="Price" placeholder="Price">

<input type="number" id="Quantity" placeholder="Quantity">

<button onclick="calculateBill()">Calculate Bill</button>

<div id="output"></div>

</div>

<script src="script1.js"></script>

</body>
</html>
